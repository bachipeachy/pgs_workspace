 <text id="text37" x="298.49426" y="67.739471" fill="#000000" font-size="13.333px" xml:space="preserve"><tspan id="tspan37" x="298.49426" y="67.739471"/></text>
 <text id="text38" x="248.37807" y="76.551109" fill="#000000" font-size="13.333px" xml:space="preserve"><tspan id="tspan38" x="248.37807" y="76.551109"/></text>
