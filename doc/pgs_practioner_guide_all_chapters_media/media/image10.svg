<?xml version="1.0" standalone="yes"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="-24 -24 1008 568" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" width="1008" height="568">

<defs>
  <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#333"/>
  </marker>
  <marker id="arrow-wide" markerWidth="12" markerHeight="8" refX="12" refY="4" orient="auto">
    <polygon points="0 0, 12 4, 0 8" fill="#333"/>
  </marker>
  <linearGradient id="discretionGrad" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" style="stop-color:#4A7FBF;stop-opacity:0.9"/>
    <stop offset="100%" style="stop-color:#4A7FBF;stop-opacity:0.08"/>
  </linearGradient>
  <linearGradient id="constraintGrad" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" style="stop-color:#BF360C;stop-opacity:0.08"/>
    <stop offset="100%" style="stop-color:#BF360C;stop-opacity:0.9"/>
  </linearGradient>
</defs>

<!-- White background -->
<rect x="-24" y="-24" width="1008" height="568" fill="#FFFFFF"/>

<!-- Border rectangle with margin -->
<rect x="-18" y="-18" width="996" height="556" rx="4" fill="none" stroke="#CCCCCC" stroke-width="1.5"/>

<!-- Title -->
<text x="480" y="32" text-anchor="middle" font-size="18" font-weight="bold" fill="#000">Authority Flow — From Declaration to Observation</text>
<text x="480" y="52" text-anchor="middle" font-size="12" fill="#000">Figure 2.10a — Lifecycle progression through the eight constitutional layers</text>

<!-- Discretion gradient bar -->
<rect x="80" y="72" width="800" height="16" rx="8" fill="url(#discretionGrad)"/>
<text x="80" y="68" font-size="10" fill="#4A7FBF" font-weight="bold">HUMAN DISCRETION</text>
<text x="880" y="68" text-anchor="end" font-size="10" fill="#000">minimal</text>
<text x="80" y="104" font-size="10" fill="#000">minimal</text>

<!-- Constraint gradient bar -->
<rect x="80" y="92" width="800" height="16" rx="8" fill="url(#constraintGrad)"/>
<text x="880" y="104" text-anchor="end" font-size="10" fill="#BF360C" font-weight="bold">STRUCTURAL CONSTRAINT</text>

<!-- ===== FOUR STAGES ===== -->

<!-- Stage 1: DECLARE -->
<rect x="50" y="140" width="190" height="240" rx="8" fill="#E8F0FE" stroke="#4A7FBF" stroke-width="2"/>
<text x="145" y="168" text-anchor="middle" font-size="15" font-weight="bold" fill="#1A3660">DECLARE</text>
<line x1="70" y1="178" x2="220" y2="178" stroke="#4A7FBF" stroke-width="0.5"/>

<text x="145" y="200" text-anchor="middle" font-size="11" font-weight="bold" fill="#000">L2 — Tooling Layer</text>
<text x="145" y="222" text-anchor="middle" font-size="10" fill="#000">Stakeholders decide</text>
<text x="145" y="237" text-anchor="middle" font-size="10" fill="#000">what the system does.</text>
<text x="145" y="268" text-anchor="middle" font-size="10" fill="#000">Artifacts created:</text>
<text x="145" y="285" text-anchor="middle" font-size="10" fill="#000" font-style="italic">IN_ Intents</text>
<text x="145" y="300" text-anchor="middle" font-size="10" fill="#000" font-style="italic">WF_ Workflows</text>
<text x="145" y="315" text-anchor="middle" font-size="10" fill="#000" font-style="italic">CC_ Contracts</text>
<text x="145" y="330" text-anchor="middle" font-size="10" fill="#000" font-style="italic">RB_ Bindings</text>
<text x="145" y="362" text-anchor="middle" font-size="9.5" fill="#000">Discretion: maximal</text>

<!-- Arrow 1→2 -->
<line x1="240" y1="260" x2="280" y2="260" stroke="#333" stroke-width="2" marker-end="url(#arrow-wide)"/>
<text x="260" y="250" text-anchor="middle" font-size="9" fill="#000" font-style="italic">drafts</text>

<!-- Stage 2: GOVERN -->
<rect x="285" y="140" width="190" height="240" rx="8" fill="#FFF3E0" stroke="#D4883A" stroke-width="2"/>
<text x="380" y="168" text-anchor="middle" font-size="15" font-weight="bold" fill="#6B3A0A">GOVERN</text>
<line x1="305" y1="178" x2="455" y2="178" stroke="#D4883A" stroke-width="0.5"/>

<text x="380" y="200" text-anchor="middle" font-size="11" font-weight="bold" fill="#000">L3 — Governance Layer</text>
<text x="380" y="216" text-anchor="middle" font-size="10" fill="#000">Constitutional validation.</text>
<text x="380" y="231" text-anchor="middle" font-size="10" fill="#000">Artifacts ratified or rejected.</text>
<text x="380" y="258" text-anchor="middle" font-size="10" fill="#000">Enforcement:</text>
<text x="380" y="275" text-anchor="middle" font-size="10" fill="#000" font-style="italic">Schema validation</text>
<text x="380" y="290" text-anchor="middle" font-size="10" fill="#000" font-style="italic">Vocabulary law</text>
<text x="380" y="305" text-anchor="middle" font-size="10" fill="#000" font-style="italic">Contract validation</text>
<text x="380" y="320" text-anchor="middle" font-size="10" fill="#000" font-style="italic">Immutability/hash</text>
<text x="380" y="348" text-anchor="middle" font-size="9" fill="#000" font-weight="bold">→ L4 Protocol Layer</text>
<text x="380" y="362" text-anchor="middle" font-size="9.5" fill="#000">Discretion: constrained</text>

<!-- Arrow 2→3 -->
<line x1="475" y1="260" x2="515" y2="260" stroke="#333" stroke-width="2" marker-end="url(#arrow-wide)"/>
<text x="495" y="250" text-anchor="middle" font-size="9" fill="#000" font-style="italic">ratified</text>

<!-- Stage 3: COMPILE -->
<rect x="520" y="140" width="190" height="240" rx="8" fill="#F3E8FF" stroke="#7E57C2" stroke-width="2" stroke-dasharray="6,3"/>
<text x="615" y="168" text-anchor="middle" font-size="15" font-weight="bold" fill="#3A1D60">COMPILE</text>
<line x1="540" y1="178" x2="690" y2="178" stroke="#7E57C2" stroke-width="0.5"/>

<text x="615" y="200" text-anchor="middle" font-size="11" font-weight="bold" fill="#000">L4 → L5 Bridge</text>
<text x="615" y="222" text-anchor="middle" font-size="10" fill="#000">Deterministic transformation.</text>
<text x="615" y="237" text-anchor="middle" font-size="10" fill="#000">Law becomes executable plan.</text>
<text x="615" y="268" text-anchor="middle" font-size="10" fill="#000">Produces:</text>
<text x="615" y="285" text-anchor="middle" font-size="10" fill="#000" font-style="italic">DAG topology</text>
<text x="615" y="300" text-anchor="middle" font-size="10" fill="#000" font-style="italic">Pipeline assembly</text>
<text x="615" y="315" text-anchor="middle" font-size="10" fill="#000" font-style="italic">CT instruction IR</text>
<text x="615" y="330" text-anchor="middle" font-size="10" fill="#000" font-style="italic">Resolved bindings</text>
<text x="615" y="362" text-anchor="middle" font-size="9.5" fill="#000">Discretion: eliminated</text>

<!-- Arrow 3→4 -->
<line x1="710" y1="260" x2="750" y2="260" stroke="#333" stroke-width="2" marker-end="url(#arrow-wide)"/>
<text x="730" y="250" text-anchor="middle" font-size="9" fill="#000" font-style="italic">plan</text>

<!-- Stage 4: EXECUTE -->
<rect x="755" y="140" width="190" height="240" rx="8" fill="#ECEFF1" stroke="#555" stroke-width="2"/>
<text x="850" y="168" text-anchor="middle" font-size="15" font-weight="bold" fill="#000">EXECUTE</text>
<line x1="775" y1="178" x2="925" y2="178" stroke="#555" stroke-width="0.5"/>

<text x="850" y="200" text-anchor="middle" font-size="11" font-weight="bold" fill="#000">L5 — Execution Layer</text>
<text x="850" y="222" text-anchor="middle" font-size="10" fill="#000">Engine enforces.</text>
<text x="850" y="237" text-anchor="middle" font-size="10" fill="#000">It does not decide.</text>
<text x="850" y="268" text-anchor="middle" font-size="10" fill="#000">Dispatches to:</text>
<text x="850" y="285" text-anchor="middle" font-size="10" fill="#000" font-style="italic">DAG Executor</text>
<text x="850" y="300" text-anchor="middle" font-size="10" fill="#00838F" font-style="italic">L6 CT — computation</text>
<text x="850" y="315" text-anchor="middle" font-size="10" fill="#BF360C" font-style="italic">L7 CS — mutation</text>
<text x="850" y="330" text-anchor="middle" font-size="10" fill="#000" font-style="italic">L8 Transport — I/O</text>
<text x="850" y="362" text-anchor="middle" font-size="9.5" fill="#000">Discretion: consumed</text>

<!-- ===== TRACE PLANE (bottom, horizontal, dashed) ===== -->
<rect x="50" y="420" width="895" height="56" rx="8" fill="#F5F5F5" stroke="#7C8898" stroke-width="1.5" stroke-dasharray="6,3"/>
<text x="480" y="444" text-anchor="middle" font-size="13" font-weight="bold" fill="#000">Trace &amp; Audit Plane (Orthogonal) — Observes Every Layer</text>
<text x="480" y="462" text-anchor="middle" font-size="10.5" fill="#000">Governed by EV_ concern — Immutable, cryptographically chained, schema-validated</text>

<!-- Dashed arrows from each stage down to Trace Plane -->
<line x1="145" y1="380" x2="145" y2="418" stroke="#7C8898" stroke-width="1" stroke-dasharray="4,3"/>
<line x1="380" y1="380" x2="380" y2="418" stroke="#7C8898" stroke-width="1" stroke-dasharray="4,3"/>
<line x1="615" y1="380" x2="615" y2="418" stroke="#7C8898" stroke-width="1" stroke-dasharray="4,3"/>
<line x1="850" y1="380" x2="850" y2="418" stroke="#7C8898" stroke-width="1" stroke-dasharray="4,3"/>

<!-- Bottom annotation -->
<text x="480" y="505" text-anchor="middle" font-size="11" fill="#000" font-weight="bold">The authority gradient is irreversible. Authority flows one way. Enforcement follows.</text>

</svg>
